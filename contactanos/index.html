<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoxSync</title>
    <style>
      body {
        background-color: #f8fafc;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
        margin: 0;
      }
      /*Header*/
      .header {
        background-color: #ffffff;
        display: flex;
        top: 0;
        width: 100%;
        left: 0%;
        padding: 15px 40px;
        justify-content: space-between;
        align-items: center;
        box-shadow: inset 0 5px 1.5cm rgba(0, 0, 0, 0.5);
      }
      .div-contenedor {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }
      .nav-menu {
        display: flex;
        gap: 35px;
        justify-content: left;
      }
      .div-titulo {
        color: rgb(37, 99, 235);
        font-weight: bold;
      }
      .div-menu {
        display: flex;
        gap: 25px;
        position: absolute;
        right: 40px;
        justify-content: center;
        align-items: center;
      }
      .lista-menu {
        list-style: none;
      }
      .a-subrayado {
        text-decoration: none;
        cursor: pointer;
        color: gray;
      }
      .a-subrayado:hover {
        color: #007bff;
      }
      .boton-suscripcion {
        background-color: #eff6ff;
        border: #007bff solid 1px;
        border-radius: 1.5rem;
        padding: 5px 15px;
        font-weight: 700;
      }
      .boton-base-de-datos {
        border: #007bff solid 1px;
        border-radius: 0.5rem;
        color: #f88400;
        padding: 5px 15px;
      }
      /*Main*/
      .main {
        width: 100%;
        background-color: #ffffff;
      }
      /*footer*/
      .footer {
        position: fixed;
        background-color: #ffffff;
        bottom: 0;
        width: 100%;
        left: 0%;
        padding: 32px 0;
        border-top: 2rem;
        box-shadow: 0 -1px 0.5cm rgba(0, 0, 0, 0.5);
      }
      .div_footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-right: 30px;
      }
      .div_footer_1 {
        display: flex;
        gap: 40px;
      }
      .div_footer_2 {
        display: flex;
        gap: 40px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="div-titulo">
        <h1 class="">BoxSync</h1>
      </div>
      <div class="div-menu">
        <nav class="nav-menu">
          <li class="lista-menu">
            <a
              href="../index.html"
              class="a-subrayado"
              style="color: #000000; font-weight: 1000"
              >Dispositivo</a
            >
          </li>
          <li class="lista-menu">
            <a href="../historial_de_la_app/index.html" class="a-subrayado"
              >Historial App</a
            >
          </li>
          <li class="lista-menu">
            <a href="index.html" class="a-subrayado">Contáctanos</a>
          </li>
          <div class="boton-base-de-datos">
            <li class="lista-menu">
              <a href="../base_de_datos/index.html" class="a-subrayado"
                >Base de Datos</a
              >
            </li>
          </div>
          <div class="boton-suscripcion">
            <li class="lista-menu">
              <a
                href="../plan_de_suscripcion/index.html"
                class="a-subrayado"
                style="color: #1d4ed8"
                >Suscripción Activa</a
              >
            </li>
          </div>
        </nav>
      </div>
    </header>
  </body>
</html>
